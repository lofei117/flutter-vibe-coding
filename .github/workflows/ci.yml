name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: local_ai_server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: local_ai_server/package-lock.json
      - run: npm ci
      - run: npm run typecheck

  flutter:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_vibe_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
